<!DOCTYPE html>
<html>
<head>
    <title>Password Analyzer</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;

            /* 🔐 MAIN BACKGROUND */
            background: url("/static/bg.png") no-repeat center center/cover;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔥 DARK OVERLAY (SECOND BACKGROUND EFFECT) */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            top: 0;
            left: 0;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;

            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            width: 350px;
            text-align: center;
            color: white;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #4facfe;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #result {
            font-weight: bold;
        }

        .weak { color: red; }
        .medium { color: orange; }
        .strong { color: lightgreen; }

        ul {
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Password Analyzer 🔐</h1>

    <form method="POST">
        <div style="position: relative;">
            <input type="password" id="password" name="password"
                   placeholder="Enter your password"
                   oninput="clearResult()" onclick="clearResult()">

            <span onclick="togglePassword()"
                  style="position: absolute; right: 15px; top: 10px; cursor: pointer;">
                
            </span>
        </div>

        <button type="submit">Check</button>
    </form>

    <p id="result" class="
        {% if 'Weak' in result %}weak
        {% elif 'Medium' in result %}medium
        {% elif 'Strong' in result %}strong
        {% endif %}
    ">
        {{ result }}
    </p>

    <p id="pattern">{{ pattern }}</p>

    <ul>
        {% for s in suggestions %}
            <li>{{ s }}</li>
        {% endfor %}
    </ul>
</div>

<script>
    function clearResult() {
        document.getElementById("result").innerText = "";
        document.getElementById("pattern").innerText = "";
    }

    function togglePassword() {
        let input = document.getElementById("password");

        if (input.type === "password") {
            input.type = "text";
        } else {
            input.type = "password";
        }
    }
</script>

</body>
</html>
